name: Link Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude '^mailto:'
            --exclude '^tel:'
            --exclude '^#'
            --exclude '^/static/'
            --exclude '^https?://localhost'
            --exclude '^https?://127\.0\.0\.1'
            --exclude 'ip-api\.com'
            --exclude 'ipapi\.co'
            --accept 200,429
            --fail
            dist/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
