<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0F172A"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="android-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Android robot body -->
  <rect x="460" y="270" width="280" height="220" rx="30" fill="url(#android-grad)" opacity="0.15"/>
  <!-- Android head -->
  <ellipse cx="600" cy="210" rx="100" ry="90" fill="url(#android-grad)" opacity="0.15"/>
  <!-- Antenna left -->
  <line x1="540" y1="130" x2="510" y2="100" stroke="#34D399" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <circle cx="508" cy="98" r="8" fill="#34D399" opacity="0.6"/>
  <!-- Antenna right -->
  <line x1="660" y1="130" x2="690" y2="100" stroke="#34D399" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <circle cx="692" cy="98" r="8" fill="#34D399" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="565" cy="215" r="14" fill="#34D399" opacity="0.8"/>
  <circle cx="635" cy="215" r="14" fill="#34D399" opacity="0.8"/>
  <!-- Arms -->
  <rect x="380" y="280" width="70" height="30" rx="15" fill="url(#android-grad)" opacity="0.15"/>
  <rect x="750" y="280" width="70" height="30" rx="15" fill="url(#android-grad)" opacity="0.15"/>
  <!-- Text: Android 17 -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#F8FAFC" letter-spacing="-2">Android 17</text>
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" font-weight="400" fill="#34D399" letter-spacing="4">BETA 3 · API LEVEL 37</text>
  <!-- Badge -->
  <rect x="460" y="525" width="280" height="44" rx="22" fill="#34D399" opacity="0.15"/>
  <text x="600" y="553" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#34D399">Platform Stability Reached</text>
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="#34D399" opacity="0.04"/>
  <circle cx="1100" cy="530" r="100" fill="#34D399" opacity="0.04"/>
  <circle cx="150" cy="520" r="60" fill="#3B82F6" opacity="0.04"/>
  <circle cx="1050" cy="100" r="70" fill="#3B82F6" opacity="0.04"/>
</svg>
