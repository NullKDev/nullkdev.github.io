<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="kotlin-grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7F52FF"/>
      <stop offset="100%" stop-color="#E44857"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Decorative blobs -->
  <circle cx="120" cy="120" r="180" fill="#7C3AED" opacity="0.06"/>
  <circle cx="1080" cy="510" r="200" fill="#7C3AED" opacity="0.06"/>
  <circle cx="1100" cy="80" r="100" fill="#A78BFA" opacity="0.04"/>
  <circle cx="80"   cy="540" r="90"  fill="#6D28D9" opacity="0.05"/>

  <!-- Grid dot pattern (subtle) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#A78BFA" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── Pattern nodes (right side constellation) ── -->
  <!-- Connector lines first (behind nodes) -->
  <line x1="820" y1="175" x2="920" y2="245" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="920" y1="245" x2="980" y2="360" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="980" y1="360" x2="920" y2="470" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="920" y1="470" x2="820" y2="530" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="820" y1="530" x2="720" y2="470" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="720" y1="470" x2="660" y2="360" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="660" y1="360" x2="720" y2="245" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <line x1="720" y1="245" x2="820" y2="175" stroke="#7C3AED" stroke-width="1.5" opacity="0.35"/>
  <!-- Diagonals -->
  <line x1="820" y1="175" x2="820" y2="530" stroke="#7C3AED" stroke-width="1"   opacity="0.15"/>
  <line x1="660" y1="360" x2="980" y2="360" stroke="#7C3AED" stroke-width="1"   opacity="0.15"/>

  <!-- Center node -->
  <circle cx="820" cy="353" r="28" fill="#7C3AED" opacity="0.18"/>
  <circle cx="820" cy="353" r="12" fill="#A78BFA" opacity="0.9" filter="url(#glow)"/>

  <!-- Outer nodes with labels -->
  <!-- Observer -->
  <circle cx="820" cy="175" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.9"/>
  <text x="820" y="180" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.9">OBS</text>
  <!-- State -->
  <circle cx="920" cy="245" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="920" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">STATE</text>
  <!-- Proxy -->
  <circle cx="980" cy="360" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="980" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">PROXY</text>
  <!-- Facade -->
  <circle cx="920" cy="470" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="920" y="475" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">FAC</text>
  <!-- Adapter -->
  <circle cx="820" cy="530" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="820" y="535" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">ADP</text>
  <!-- Factory -->
  <circle cx="720" cy="470" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="720" y="475" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">FAC</text>
  <!-- Strategy -->
  <circle cx="660" cy="360" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="660" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">STR</text>
  <!-- Decorator -->
  <circle cx="720" cy="245" r="20" fill="#1E1035" stroke="#A78BFA" stroke-width="1.5" opacity="0.85"/>
  <text x="720" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#A78BFA" opacity="0.85">DEC</text>

  <!-- ── Left: text content ── -->
  <!-- Eyebrow -->
  <text x="80" y="180" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#A78BFA" letter-spacing="4" opacity="0.7">ANDROID · KOTLIN · ARCHITECTURE</text>

  <!-- Main title -->
  <text x="80" y="265" font-family="system-ui,sans-serif" font-size="78" font-weight="900" fill="url(#title-grad)" letter-spacing="-3">8 GoF</text>
  <text x="80" y="340" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="#F8FAFC" letter-spacing="-1">Patterns That</text>
  <text x="80" y="385" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="#F8FAFC" letter-spacing="-1">Decide If Your</text>
  <text x="80" y="430" font-family="system-ui,sans-serif" font-size="38" font-weight="700" fill="#A78BFA" letter-spacing="-1">App Scales</text>

  <!-- Divider line -->
  <rect x="80" y="458" width="60" height="3" rx="2" fill="#7C3AED" opacity="0.8"/>

  <!-- Subtitle row -->
  <text x="80" y="502" font-family="system-ui,sans-serif" font-size="17" fill="#94A3B8" letter-spacing="0.5">Observer · State · Proxy · Facade</text>
  <text x="80" y="528" font-family="system-ui,sans-serif" font-size="17" fill="#94A3B8" letter-spacing="0.5">Adapter · Factory · Strategy · Decorator</text>

  <!-- Kotlin badge -->
  <rect x="80" y="556" width="130" height="36" rx="18" fill="#7F52FF" opacity="0.2"/>
  <rect x="80" y="556" width="130" height="36" rx="18" stroke="#7F52FF" stroke-width="1.5" opacity="0.6"/>
  <text x="145" y="580" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#A78BFA">Kotlin</text>

  <rect x="222" y="556" width="160" height="36" rx="18" fill="#1E293B" opacity="0.6"/>
  <rect x="222" y="556" width="160" height="36" rx="18" stroke="#334155" stroke-width="1.5"/>
  <text x="302" y="580" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#64748B">Production Scale</text>
</svg>
