<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0F172A"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Server box -->
  <rect x="120" y="210" width="220" height="210" rx="16" fill="#818CF8" opacity="0.1" stroke="#818CF8" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="230" y="282" text-anchor="middle" font-family="monospace" font-size="13" fill="#818CF8" opacity="0.7">remote-creation</text>
  <rect x="150" y="295" width="160" height="12" rx="4" fill="#818CF8" opacity="0.25"/>
  <rect x="150" y="315" width="120" height="12" rx="4" fill="#818CF8" opacity="0.18"/>
  <rect x="150" y="335" width="140" height="12" rx="4" fill="#818CF8" opacity="0.18"/>
  <text x="230" y="385" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#818CF8" opacity="0.8">Server / JVM</text>

  <!-- Arrow -->
  <line x1="345" y1="315" x2="490" y2="315" stroke="#4F46E5" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <polygon points="488,308 500,315 488,322" fill="#4F46E5" opacity="0.6"/>
  <!-- Document label -->
  <rect x="365" y="285" width="110" height="24" rx="6" fill="#4F46E5" opacity="0.15"/>
  <text x="420" y="301" text-anchor="middle" font-family="monospace" font-size="11" fill="#818CF8">.document</text>

  <!-- Player box -->
  <rect x="500" y="210" width="220" height="210" rx="16" fill="#34D399" opacity="0.08" stroke="#34D399" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="610" y="282" text-anchor="middle" font-family="monospace" font-size="13" fill="#34D399" opacity="0.7">remote-player</text>
  <!-- UI sketch inside player -->
  <rect x="530" y="298" width="160" height="90" rx="8" fill="#34D399" opacity="0.08"/>
  <rect x="540" y="308" width="80" height="10" rx="3" fill="#34D399" opacity="0.3"/>
  <rect x="540" y="325" width="140" height="8" rx="3" fill="#34D399" opacity="0.2"/>
  <rect x="540" y="339" width="110" height="8" rx="3" fill="#34D399" opacity="0.2"/>
  <rect x="540" y="358" width="60" height="22" rx="6" fill="#34D399" opacity="0.25"/>
  <text x="610" y="413" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="#34D399" opacity="0.8">Android Client</text>

  <!-- Arrow right -->
  <line x1="725" y1="315" x2="860" y2="315" stroke="#34D399" stroke-width="2" opacity="0.4"/>
  <polygon points="858,308 870,315 858,322" fill="#34D399" opacity="0.4"/>

  <!-- Phone -->
  <rect x="870" y="185" width="170" height="260" rx="20" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <rect x="880" y="210" width="150" height="210" rx="8" fill="#0F172A"/>
  <!-- UI on phone -->
  <rect x="892" y="222" width="90" height="12" rx="4" fill="#818CF8" opacity="0.6"/>
  <rect x="892" y="242" width="126" height="8" rx="3" fill="#475569" opacity="0.6"/>
  <rect x="892" y="258" width="100" height="8" rx="3" fill="#475569" opacity="0.4"/>
  <rect x="892" y="278" width="126" height="60" rx="8" fill="#1E293B"/>
  <rect x="892" y="348" width="60" height="24" rx="6" fill="#4F46E5" opacity="0.7"/>
  <circle cx="945" cy="194" r="5" fill="#334155"/>

  <!-- Main title -->
  <text x="600" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="60" font-weight="800" fill="#F8FAFC" letter-spacing="-1">Remote Compose</text>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#818CF8">Server-Driven UI for Android · alpha07</text>

  <!-- Decorations -->
  <circle cx="80" cy="560" r="60" fill="#4F46E5" opacity="0.05"/>
  <circle cx="1130" cy="80" r="80" fill="#34D399" opacity="0.04"/>
</svg>
